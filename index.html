<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思政热点选题助手 · 智能体版 v2</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js" defer></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #2c5f8a; --primary-light: #3a7bb5; --primary-bg: #e8f0f8;
  --primary-bg-light: #f0f5fa; --gold: #d4af37; --bg: #f8fafc; --white: #ffffff;
  --text: #1e293b; --text-secondary: #475569; --text-muted: #94a3b8;
  --border: #e2e8f0; --shadow: 0 2px 12px rgba(44,95,138,0.08);
  --shadow-lg: 0 4px 24px rgba(44,95,138,0.15); --radius: 10px; --radius-sm: 7px;
  --transition: 0.2s ease; --log-bg: #0f172a; --log-text: #e2e8f0;
  --log-accent: #38bdf8; --log-warn: #fbbf24; --log-success: #34d399; --log-error: #f87171;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.7; min-height: 100vh; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

/* Header */
.header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.04); position: sticky; top: 0; z-index: 200; }
.header-logo { font-size: 18px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
.header-badge { font-size: 11px; background: var(--primary); color: #fff; padding: 2px 7px; border-radius: 10px; margin-left: 6px; font-weight: 600; }
.header-subtitle { font-size: 12px; color: var(--text-muted); margin-left: 8px; padding-left: 8px; border-left: 1px solid var(--border); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; transition: all var(--transition); white-space: nowrap; font-family: inherit; }
.btn-primary { background: var(--primary); color: var(--white); }
.btn-primary:hover:not(:disabled) { background: var(--primary-light); }
.btn-outline { background: var(--white); color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:hover:not(:disabled) { background: var(--primary-bg); }
.btn-sm { padding: 5px 12px; font-size: 13px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* API Panel */
.api-panel { background: var(--white); border-bottom: 1px solid var(--border); }
.api-panel.collapsed .api-panel-inner { display: none; }
.api-panel-inner { padding: 12px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.api-panel label { font-size: 12px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
.api-panel input { flex: 1; min-width: 160px; padding: 7px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; font-family: monospace; transition: border-color var(--transition); }
.api-panel input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(44,95,138,0.1); }
.api-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
.api-hint { font-size: 11px; color: var(--text-muted); width: 100%; }
.api-hint a { color: var(--primary); }
.api-toggle { font-size: 12px; color: var(--primary); cursor: pointer; background: none; border: none; margin-left: auto; padding: 4px 8px; font-family: inherit; }
.api-toggle:hover { text-decoration: underline; }

/* Layout */
.main { max-width: 1500px; margin: 0 auto; padding: 20px 24px; display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: start; }
.left-panel { display: flex; flex-direction: column; gap: 14px; position: sticky; top: 70px; max-height: calc(100vh - 90px); overflow-y: auto; }
.right-panel { display: flex; flex-direction: column; gap: 14px; min-width: 0; }

/* Card */
.card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
.card-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }

/* Search mode dropdown */
.search-mode-wrap { margin-bottom: 10px; }
.search-mode-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
.search-mode-select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--white); color: var(--text); cursor: pointer; transition: border-color var(--transition); }
.search-mode-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(44,95,138,0.1); }

/* Checkbox option */
.agent-option { display: flex; align-items: flex-start; gap: 9px; padding: 7px 8px; border-radius: 6px; cursor: pointer; transition: background var(--transition); margin-bottom: 2px; }
.agent-option:hover { background: var(--primary-bg-light); }
.agent-option input[type="checkbox"] { accent-color: var(--primary); width: 15px; height: 15px; flex-shrink: 0; margin-top: 2px; }
.agent-option-label { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
.agent-option-desc { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

/* Collapsible */
.collapsible { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 12px; }
.collapsible-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 13px; background: var(--primary-bg-light); cursor: pointer; user-select: none; }
.collapsible-header:hover { background: #dce6f2; }
.collapsible-title { font-size: 13px; font-weight: 600; color: var(--primary); }
.collapsible-arrow { font-size: 11px; color: var(--primary); transition: transform var(--transition); }
.collapsible.open .collapsible-arrow { transform: rotate(180deg); }
.collapsible-body { display: none; padding: 12px; }
.collapsible.open .collapsible-body { display: block; }

/* Inputs */
.input-field { width: 100%; padding: 9px 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; resize: none; transition: border-color var(--transition); }
.input-field:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(44,95,138,0.1); }
.req-textarea { width: 100%; min-height: 80px; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; resize: vertical; }
.req-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(44,95,138,0.1); }

/* Scenario */
.section-label { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
.scenario-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.scenario-opt { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; transition: all var(--transition); }
.scenario-opt:hover { border-color: var(--primary); background: var(--primary-bg-light); }
.scenario-opt.selected { border-color: var(--primary); background: var(--primary-bg); }
.scenario-opt input[type="radio"] { accent-color: var(--primary); width: 14px; height: 14px; }
.scenario-opt input[type="radio"]:checked + span { color: var(--primary); font-weight: 600; }

/* Keywords */
.kw-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.kw-group { margin-bottom: 10px; }
.kw-group-name { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
.kw-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.kw-tag { padding: 3px 9px; background: var(--primary-bg); color: var(--primary); border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid transparent; transition: all var(--transition); }
.kw-tag:hover { background: var(--primary); color: var(--white); }

/* Generate button */
.btn-generate { width: 100%; padding: 13px 20px; font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #2c5f8a 0%, #3a7bb5 100%); color: var(--white); border: none; border-radius: var(--radius); cursor: pointer; transition: all var(--transition); box-shadow: 0 4px 14px rgba(44,95,138,0.2); letter-spacing: 0.5px; font-family: inherit; }
.btn-generate:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(44,95,138,0.3); }
.btn-generate:active:not(:disabled) { transform: none; }
.btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* Status */
.status-msg { padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 10px; display: none; }
.status-msg.error { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6cb; display: block; }
.status-msg.success { background: #f0fff4; color: #27ae60; border: 1px solid #c3e6cb; display: block; }

/* ===== Agent Log Terminal ===== */
.agent-log-wrap { background: var(--log-bg); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.agent-log-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; background: #0a1628; border-bottom: 1px solid #1e3352; }
.agent-log-title { font-size: 12px; font-weight: 700; color: var(--log-accent); display: flex; align-items: center; gap: 7px; font-family: monospace; letter-spacing: 0.5px; }
.log-dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; flex-shrink: 0; }
.log-dot.active { background: var(--log-success); animation: logPulse 1.5s ease-in-out infinite; }
@keyframes logPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.4); } 50% { box-shadow: 0 0 0 5px rgba(52,211,153,0); } }
.agent-log-clear { background: none; border: 1px solid #334155; color: #64748b; padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; font-family: monospace; transition: all var(--transition); }
.agent-log-clear:hover { border-color: var(--log-accent); color: var(--log-accent); }
.agent-log-body { padding: 10px 14px; max-height: 260px; overflow-y: auto; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 11.5px; line-height: 1.65; color: var(--log-text); }
.log-entry { padding: 1.5px 0; animation: logIn 0.25s ease; }
@keyframes logIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: none; } }
.log-time { color: #475569; }
.log-tag { color: var(--log-accent); }
.log-c-info { color: var(--log-text); }
.log-c-warn { color: var(--log-warn); }
.log-c-success { color: var(--log-success); }
.log-c-error { color: var(--log-error); }
.log-c-gold { color: #fbbf24; font-weight: 600; }
.log-placeholder { color: #334155; text-align: center; padding: 24px 0; font-size: 11px; }
.log-radar { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
.radar-bars { display: flex; gap: 2px; align-items: center; }
.radar-bars span { display: inline-block; width: 3px; background: var(--log-accent); border-radius: 2px; animation: radarBar 1.2s ease-in-out infinite; }
.radar-bars span:nth-child(1) { height: 6px; animation-delay: 0s; }
.radar-bars span:nth-child(2) { height: 10px; animation-delay: 0.1s; }
.radar-bars span:nth-child(3) { height: 14px; animation-delay: 0.2s; }
.radar-bars span:nth-child(4) { height: 10px; animation-delay: 0.3s; }
.radar-bars span:nth-child(5) { height: 6px; animation-delay: 0.4s; }
@keyframes radarBar { 0%,100% { opacity: 0.3; transform: scaleY(0.5); } 50% { opacity: 1; transform: scaleY(1); } }
.score-badge { display: inline-block; padding: 1px 7px; border-radius: 8px; font-size: 11px; font-weight: 700; margin-left: 4px; }
.score-badge.high { background: rgba(52,211,153,0.2); color: var(--log-success); }
.score-badge.mid { background: rgba(251,191,36,0.2); color: var(--log-warn); }
.score-badge.low { background: rgba(248,113,113,0.2); color: var(--log-error); }

/* Output */
.output-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.output-toolbar { display: flex; align-items: center; gap: 6px; }
.export-wrap { position: relative; display: inline-block; }
.export-menu { position: absolute; top: calc(100% + 4px); right: 0; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); z-index: 300; min-width: 170px; display: none; overflow: hidden; }
.export-menu.open { display: block; }
.export-item { display: flex; align-items: center; gap: 8px; padding: 10px 14px; font-size: 13px; color: var(--text); cursor: pointer; background: none; border: none; width: 100%; text-align: left; font-family: inherit; transition: background var(--transition); }
.export-item:hover { background: var(--primary-bg); }
.export-item + .export-item { border-top: 1px solid var(--border); }
.output-area { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; min-height: 300px; }
.output-placeholder { color: var(--text-muted); text-align: center; padding: 60px 20px; font-size: 14px; }
.output-placeholder .icon { font-size: 44px; margin-bottom: 14px; display: block; }

/* Markdown */
.md-out { line-height: 1.8; }
.md-out h1 { font-size: 20px; font-weight: 700; color: var(--primary); margin: 24px 0 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
.md-out h1:first-child, .md-out h2:first-child { margin-top: 0; }
.md-out h2 { font-size: 17px; font-weight: 700; color: var(--primary); margin: 20px 0 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
.md-out h3 { font-size: 15px; font-weight: 600; color: var(--text); margin: 16px 0 6px; }
.md-out p { margin-bottom: 9px; }
.md-out strong { color: var(--primary); font-weight: 700; }
.md-out em { font-style: italic; color: var(--text-secondary); }
.md-out ul, .md-out ol { margin: 8px 0 8px 22px; }
.md-out li { margin-bottom: 5px; }
.md-out blockquote { border-left: 3px solid var(--primary); padding: 8px 14px; margin: 12px 0; color: var(--text-secondary); background: var(--primary-bg-light); border-radius: 0 4px 4px 0; }
.md-out code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: monospace; }
.md-out pre { background: var(--bg); padding: 14px; border-radius: var(--radius-sm); overflow-x: auto; margin: 12px 0; }
.md-out pre code { background: none; padding: 0; }
.md-out hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* Loading */
.loading-dots { display: inline-flex; gap: 4px; align-items: center; padding: 10px 0; }
.loading-dots span { width: 7px; height: 7px; background: var(--primary); border-radius: 50%; animation: dotBounce 1.4s infinite ease-in-out both; }
.loading-dots span:nth-child(1) { animation-delay: -0.32s; }
.loading-dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes dotBounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
.loading-txt { color: var(--text-muted); font-size: 13px; margin-top: 6px; }
.cursor::after { content: '▌'; animation: blink 1s step-end infinite; color: var(--primary); }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* Followup */
.followup-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; }
.followup-card h3 { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.followup-ta { width: 100%; min-height: 70px; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; resize: vertical; margin-bottom: 10px; }
.followup-ta:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(44,95,138,0.1); }
.followup-actions { display: flex; gap: 8px; }

/* Conv turn */
.conv-turn { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px dashed var(--border); }
.conv-turn:last-child { border-bottom: none; }
.turn-lbl { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.turn-lbl.user { color: var(--primary); }

/* Footer */
.footer { text-align: center; padding: 18px; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border); background: var(--white); margin-top: 24px; }

/* Responsive */
@media (max-width: 960px) { .main { grid-template-columns: 1fr; padding: 12px; } .left-panel { position: static; max-height: none; } }
@media (max-width: 600px) { .header { padding: 0 14px; } .header-subtitle { display: none; } .main { padding: 10px; gap: 10px; } .output-area { padding: 14px; } }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ===== Header ===== -->
<header class="header">
  <div class="header-logo">📖 思政热点选题助手<span class="header-badge">Agent v2</span></div>
  <span class="header-subtitle">自主工具调用 · 自适应反思循环</span>
  <div class="header-right"></div>
</header>

<!-- ===== API Panel ===== -->
<div class="api-panel" id="apiPanel">
  <div class="api-panel-inner">
    <label>🔑 DeepSeek Key：</label>
    <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxx" autocomplete="off">
    <button class="btn btn-primary btn-sm" id="saveApiKeyBtn">保存</button>
    <div class="api-divider"></div>
    <label>🔍 Serper Key：</label>
    <input type="password" id="serperKeyInput" placeholder="Agent 联网搜索（可选）" autocomplete="off">
    <button class="btn btn-primary btn-sm" id="saveSerperKeyBtn">保存</button>
    <button class="api-toggle" id="apiToggleBtn">收起 ▲</button>
    <div class="api-hint">
      🔒 Key 仅存储在您的浏览器本地。Serper 免费 2500次/月 →
      <a href="https://serper.dev" target="_blank" rel="noopener">serper.dev</a>
    </div>
  </div>
</div>

<!-- ===== Main ===== -->
<div class="main">

  <!-- Left Panel -->
  <div class="left-panel">

    <!-- Agent Config -->
    <div class="card">
      <div class="card-title">🤖 智能体配置</div>

      <div class="search-mode-wrap">
        <div class="search-mode-label">🌐 联网搜索策略</div>
        <select id="searchModeSelect" class="search-mode-select">
          <option value="smart" selected>🧠 智能决策（Agent 自主判断是否需要搜索）</option>
          <option value="force-on">🔗 强制联网（每次必搜索）</option>
          <option value="force-off">🔒 强制不联网（纯本地知识）</option>
        </select>
      </div>

      <label class="agent-option">
        <input type="checkbox" id="chkReflection" checked>
        <div>
          <div class="agent-option-label">🔄 开启自适应反思循环（Auto-Reflect）</div>
          <div class="agent-option-desc">专家组评估初稿 → 评分≥90直接交付，＜90自动重写（最多3轮）</div>
        </div>
      </label>
    </div>

    <!-- Input Card -->
    <div class="card">

      <!-- Activity Requirements (Collapsible) -->
      <div class="collapsible" id="reqPanel">
        <div class="collapsible-header" id="reqToggle">
          <span class="collapsible-title">📄 活动/比赛要求（选填）</span>
          <span class="collapsible-arrow">▼</span>
        </div>
        <div class="collapsible-body">
          <textarea class="req-textarea" id="requirementText" placeholder="粘贴比赛通知、主题要求、评分标准等…"></textarea>
        </div>
      </div>

      <!-- Scenario -->
      <div class="section-label" style="margin-top:12px">🎯 使用场景</div>
      <div class="scenario-group" id="scenarioGroup">
        <label class="scenario-opt"><input type="radio" name="scenario" value="演讲比赛"><span>🎤 演讲比赛</span></label>
        <label class="scenario-opt"><input type="radio" name="scenario" value="班会设计"><span>📚 班会设计</span></label>
        <label class="scenario-opt"><input type="radio" name="scenario" value="课题申报"><span>📋 课题申报</span></label>
        <label class="scenario-opt"><input type="radio" name="scenario" value="主题宣讲"><span>📢 主题宣讲</span></label>
        <label class="scenario-opt"><input type="radio" name="scenario" value="技能大赛"><span>🏆 技能大赛</span></label>
      </div>

      <!-- Keyword Input -->
      <div class="section-label">✏️ 输入热点词</div>
      <textarea class="input-field" id="kwInput" rows="2" placeholder="例如：拼豆、搭子文化、City Walk、发疯文学…"></textarea>

      <!-- Built-in Keywords -->
      <div class="kw-header">
        <div class="section-label" style="margin-bottom:0">📌 内置热点词</div>
      </div>
      <div id="kwGroups" style="margin-bottom:14px"></div>

      <div id="inputStatus" class="status-msg"></div>
      <button class="btn-generate" id="generateBtn">🚀 启动 Agent 生成</button>
    </div>

  </div><!-- /left-panel -->

  <!-- Right Panel -->
  <div class="right-panel">

    <!-- Agent Log Terminal -->
    <div class="agent-log-wrap">
      <div class="agent-log-header">
        <div class="agent-log-title">
          <span class="log-dot" id="logDot"></span>
          ⚡ 智能体决策舱 · Agent Terminal
        </div>
        <button class="agent-log-clear" id="logClearBtn">清空日志</button>

// ============================================================

async function serperSearch(query) {
  const key = localStorage.getItem(LS_SERPER) || $('serperKeyInput').value.trim();
  if (!key) return null;
  try {
    const resp = await fetch(SERPER_URL, {
      method: 'POST',
      headers: { 'X-API-KEY': key, 'Content-Type': 'application/json' },
      body: JSON.stringify({ q: query, num: 6, gl: 'cn', hl: 'zh-cn' })
    });
    if (!resp.ok) { logMsg('warn', `⚠️ Serper HTTP ${resp.status}，跳过联网`); return null; }
    const data = await resp.json();
    return (data.organic || []).map(r => ({ title: r.title||'', snippet: r.snippet||'', link: r.link||'' }));
  } catch (e) {
    logMsg('error', `❌ Serper 调用失败：${esc(e.message)}`);
    return null;
  }
}

function formatSearchResults(results) {
  if (!results || !results.length) return '未找到相关搜索结果。';
  let s = '【联网搜索结果摘要】\n\n';
  results.forEach((r, i) => { s += `来源${i+1}：${r.title}\n摘要：${r.snippet}\n\n`; });
  s += '请根据以上最新资讯，补充相关背景信息。';
  return s;
}

// ============================================================
// DEEPSEEK API — Non-streaming (for eval/reflection)
// ============================================================
async function callDeepSeek(messages, opts) {
  opts = opts || {};
  const key = localStorage.getItem(LS_API) || $('apiKeyInput').value.trim();
  if (!key) throw new Error('请先设置 DeepSeek API Key');

  const body = {
    model: MODEL, messages,
    temperature: opts.temperature || 0.7,
    max_tokens: opts.max_tokens || 3000
  };
  if (opts.tools) { body.tools = opts.tools; body.tool_choice = opts.tool_choice || 'auto'; }

  const resp = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
    body: JSON.stringify(body)
  });
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');
    if (resp.status === 401) throw new Error('API Key 无效或已过期');
    if (resp.status === 429) throw new Error('请求过于频繁，请稍后重试');
    throw new Error(`HTTP ${resp.status}: ${txt.slice(0,200)}`);
  }
  const data = await resp.json();
  const choice = data.choices?.[0];
  return {
    content: choice?.message?.content || '',
    tool_calls: choice?.message?.tool_calls || null,
    finish_reason: choice?.finish_reason || 'stop',
    message: choice?.message
  };
}

// ============================================================
// DEEPSEEK API — Streaming (for final draft output)
// ============================================================
async function streamDeepSeek(messages, onChunk, opts) {
  opts = opts || {};
  const key = localStorage.getItem(LS_API) || $('apiKeyInput').value.trim();
  if (!key) throw new Error('请先设置 DeepSeek API Key');

  const body = { model: MODEL, messages, stream: true, temperature: opts.temperature || 0.7, max_tokens: opts.max_tokens || 4096 };
  const resp = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
    body: JSON.stringify(body)
  });
  if (!resp.ok) {
    const txt = await resp.text().catch(() => '');
    if (resp.status === 401) throw new Error('API Key 无效或已过期');
    if (resp.status === 429) throw new Error('请求过于频繁，请稍后重试');
    throw new Error(`HTTP ${resp.status}: ${txt.slice(0,200)}`);
  }
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop() || '';
    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed || trimmed === 'data: [DONE]') continue;
      if (!trimmed.startsWith('data: ')) continue;
      try {
        const json = JSON.parse(trimmed.slice(6));
        const delta = json.choices?.[0]?.delta?.content;
        if (delta) onChunk(delta);
      } catch (_) {}
    }
  }
}

// ============================================================
// MARKDOWN RENDERER
// ============================================================
function renderMd(text) {
  if (!text) return '';
  let h = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h = h.replace(/```[\w]*\n([\s\S]*?)```/g, (_, c) => `<pre><code>${c.trim()}</code></pre>`);
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>[^]*?<\/li>\n?)+)/g, '<ul>$1</ul>');
  h = h.replace(/^---$/gm, '<hr>');
  h = h.replace(/\n\n/g, '</p><p>');
  h = h.replace(/\n/g, '<br>');
  h = h.replace(/<p><(h[123]|ul|ol|pre|blockquote|hr)/g, '<$1');
  h = h.replace(/<\/(h[123]|ul|ol|pre|blockquote)><\/p>/g, '</$1>');
  h = h.replace(/<p><\/p>/g, '');
  return h;
}

async function evaluateDraft(draft, keyword, scenario) {

2. 育人实效（25分）：方案是否有真正的教育价值和学生获得感
3. 青年契合度（25分）：是否贴近当代大学生心理特征和文化语境
4. 结构文采（20分）：标题文采、逻辑结构、表达质量

  const result = await callDeepSeek([
    { role: 'system', content: '你是一名严格的思政教育专家评委，请按要求格式输出评估结果。' },
    { role: 'user', content: evalPrompt }

}

function parseEvalResult(text) {
  const scoreM = text.match(/【总分】\s*(\d+)/);
  const sugM = text.match(/【改进建议】\s*([\s\S]*?)(?=【|$)/);
  return {
    score: scoreM ? parseInt(scoreM[1]) : null,
    suggestions: sugM ? sugM[1].trim() : ''
  };
}

// ============================================================
// AUTONOMOUS TOOL USE — Draft generation with Function Calling
// ============================================================
async function generateDraftWithToolUse(messages, keyword, scenario, searchMode) {
  const serperKey = localStorage.getItem(LS_SERPER) || $('serperKeyInput').value.trim();
  const canSearch = !!serperKey;

  let toolsToUse = null;
  let forceSearch = false;

  if (searchMode === 'force-on') {
    forceSearch = true;
  } else if (searchMode === 'smart' && canSearch) {
    toolsToUse = [SERPER_TOOL_DEF];
  }
  // force-off: no tools

  if (forceSearch && canSearch) {
    // Skip function calling, directly search
    const q = `${keyword} 大学生 思政教育 最新`;
    logMsg('info', `🔗 强制联网模式：直接搜索「${esc(q)}」…`);
    logRadarStart('联网搜索中');
    const results = await serperSearch(q);
    logRadarEnd();
    if (results && results.length) {
      logMsg('success', `✅ 获取到 ${results.length} 条搜索结果`);
      const searchContent = formatSearchResults(results);
      // Append search context to last user message
      const augMessages = messages.map((m, i) =>
        (i === messages.length - 1 && m.role === 'user')
          ? { ...m, content: m.content + '\n\n' + searchContent }
          : m
      );
      return { messages: augMessages, searched: true };
    } else {
      logMsg('warn', '⚠️ 搜索无结果，回退纯知识模式');
      return { messages, searched: false };
    }
  }

  if (toolsToUse) {
    // Smart mode: send with tools and let model decide
    logMsg('info', `🤔 思考：分析热点词「${esc(keyword)}」新颖度，判断是否需要联网补充…`);
    const r = await callDeepSeek(messages, { tools: toolsToUse, tool_choice: 'auto', temperature: 0.3, max_tokens: 500 });

    if (r.finish_reason === 'tool_calls' && r.tool_calls && r.tool_calls.length > 0) {
      logMsg('gold', `💡 决定进行自主联网搜索以补充背景知识…`);
      const tc = r.tool_calls[0];
      let query = keyword + ' 思政教育 大学生';
      try {
        const args = JSON.parse(tc.function.arguments || '{}');
        if (args.query) query = args.query;
      } catch (_) {}
      logMsg('info', `🔍 搜索关键词：「${esc(query)}」`);
      logRadarStart('正在联网检索');
      const results = await serperSearch(query);
      logRadarEnd();

      if (results && results.length) {
        logMsg('success', `✅ 联网检索完成，获取到 ${results.length} 条最新资讯`);
        const searchContent = formatSearchResults(results);
        // Build messages with tool call result
        const augMessages = [
          ...messages,
          { role: 'assistant', content: r.content || null, tool_calls: r.tool_calls },
          {
            role: 'tool',
            tool_call_id: tc.id,
            name: tc.function.name,
            content: searchContent
          }
        ];
        return { messages: augMessages, searched: true };
      } else {
        logMsg('warn', '⚠️ 搜索无结果，Agent 切换到纯知识生成模式');
        return { messages, searched: false };
      }
    } else {
      logMsg('info', `💭 Agent 判断：知识储备充足，无需联网，直接进入生成阶段`);
      return { messages, searched: false };
    }
  }

  // force-off or no serper key
  if (searchMode === 'force-off') {
    logMsg('info', '🔒 强制不联网模式，纯本地知识生成');
  } else {
    logMsg('warn', '⚠️ 未配置 Serper Key，使用纯知识模式（可在顶部 API 面板配置）');
  }
  return { messages, searched: false };
}

    $('mdOutput').innerHTML = `<div class="md-out">${renderMd(draft)}</div>`;
    conversationHistory = [...augMessages, { role: 'assistant', content: draft }];
    logMsg('success', `✅ 初稿撰写完成（${draft.length} 字）`);

    // === ADAPTIVE REFLECTION LOOP ===
    if (doReflection) {
      logMsg('info', `🧐 审视：内容已完成，正在提交专家组评审…`);

      let currentDraft = draft;
      const MAX_ITER = 3;
      let finalScore = null;

      for (let iter = 1; iter <= MAX_ITER; iter++) {
        logRadarStart(`专家组评审中（第 ${iter} 轮）`);
        let evalText = '';
        try {
          evalText = await evaluateDraft(currentDraft, keyword, scenario);
        } catch (e) {
          logRadarEnd();
          logMsg('warn', `⚠️ 评估请求失败：${esc(e.message)}，跳过反思循环`);
          break;
        }
        logRadarEnd();

        const { score, suggestions } = parseEvalResult(evalText);
        finalScore = score;

        const scoreClass = score >= 90 ? 'high' : score >= 70 ? 'mid' : 'low';
        const scoreBadge = score !== null
          ? `<span class="score-badge ${scoreClass}">${score}分</span>`
          : '<span class="score-badge mid">?分</span>';

        if (score === null) {
          logMsg('warn', `⚠️ 无法解析评分，跳出循环`);
          break;
        }

        if (score >= 90) {
          logMsg('success', `✨ 达成：评分 ${scoreBadge}，已达到交付标准，正在准备导出组件…`);
          break;
        }

        // Score < 90 and more iterations available
        const shortSuggestion = suggestions.split('\n').slice(0, 2).join(' ').slice(0, 60);
        logMsg('warn', `⚖️ 评估得分：${scoreBadge}。未达标，启动反思修正循环（第 ${iter} 次）…`);
        logMsg('warn', `📉 反思：评分 ${score}，${esc(shortSuggestion)}…`);

        if (iter < MAX_ITER) {
          logMsg('info', `🔄 正在按照专家建议进行深度重构（第 ${iter} 次修正）…`);
          $('mdOutput').innerHTML = `<div class="md-out">${renderMd(currentDraft)}</div><div class="loading-dots" style="margin-top:10px"><span></span><span></span><span></span></div><div class="loading-txt">专家建议修正中（第 ${iter} 次）…</div>`;
          try {
            const rewritten = await rewriteDraft(currentDraft, suggestions, keyword, scenario);
            if (rewritten && rewritten.length > 100) {
              currentDraft = rewritten;
              currentRawText = rewritten;
              $('mdOutput').innerHTML = `<div class="md-out">${renderMd(currentDraft)}</div>`;
              conversationHistory.push({ role: 'user', content: `请根据以下专家建议重写：${suggestions}` });
              conversationHistory.push({ role: 'assistant', content: currentDraft });
              logMsg('success', `✅ 第 ${iter} 次重写完成（${currentDraft.length} 字）`);
            } else {
              logMsg('warn', '⚠️ 重写内容过短，保留原稿');
              break;
            }
          } catch (e) {
            logMsg('error', `❌ 重写失败：${esc(e.message)}`);
            break;
          }
        } else {
          logMsg('warn', `⚠️ 已达最大反思轮次（${MAX_ITER}次），以当前最优版本输出`);
        }
      }

      if (finalScore !== null && finalScore >= 90) {
        logMsg('gold', `✨ 达成：评分 ${finalScore}，已达到交付标准，正在准备 Word/PPT 导出组件…`);
      }
    } else {
      logMsg('success', `✅ 初稿生成完成，反思循环已关闭`);
    }

    // === FINALIZE UI ===
    $('mdOutput').innerHTML = `<div class="md-out">${renderMd(currentRawText)}</div>`;
    $('copyBtn').disabled = false;
    $('clearBtn').disabled = false;
    $('exportBtn').disabled = false;
    $('followupCard').classList.remove('hidden');
    logDeactivate();

  } catch (e) {
    logMsg('error', `❌ Agent 运行异常：${esc(e.message)}`);
    $('mdOutput').innerHTML = `<div style="color:#c0392b;padding:20px">❌ ${esc(e.message)}</div>`;
    logDeactivate();
  } finally {
    isGenerating = false;
    $('generateBtn').disabled = false;
    $('generateBtn').textContent = '🚀 启动 Agent 生成';
  }
}

// ============================================================
// FOLLOW-UP
// ============================================================
async function handleFollowup() {
  const feedback = $('followupInput').value.trim();
  if (!feedback) { showStatus($('followupStatus'), '请输入修改意见', 'error'); return; }
  if (isGenerating) { showStatus($('followupStatus'), '正在生成中，请稍后…', 'error'); return; }

  conversationHistory.push({ role: 'user', content: feedback });
  $('followupInput').value = '';
  hideStatus($('followupStatus'));
  $('sendFollowupBtn').disabled = true;
  $('sendFollowupBtn').textContent = '⏳ 生成中…';

  const prevContent = $('mdOutput').innerHTML;
  $('mdOutput').innerHTML = prevContent + '<div class="loading-dots" style="margin-top:10px"><span></span><span></span><span></span></div><div class="loading-txt">正在优化…</div>';

  try {
    let fullText = '';
    await streamDeepSeek(conversationHistory, chunk => {
      fullText += chunk;
      $('mdOutput').innerHTML = prevContent.replace(/<span class="cursor"><\/span>/, '') +
        `<div class="conv-turn"><div class="turn-lbl user">👤 修改意见</div><p>${esc(feedback)}</p></div>` +
        `<div class="conv-turn"><div class="turn-lbl">🤖 AI 回复</div><div class="md-out">${renderMd(fullText)}</div></div>` +
        '<span class="cursor"></span>';
      $('outputArea').scrollTop = 99999;
    });
    conversationHistory.push({ role: 'assistant', content: fullText });
    currentRawText += '\n\n' + fullText;
    $('mdOutput').innerHTML = prevContent.replace(/<span class="cursor"><\/span>/, '') +
      `<div class="conv-turn"><div class="turn-lbl user">👤 修改意见</div><p>${esc(feedback)}</p></div>` +
      `<div class="conv-turn"><div class="turn-lbl">🤖 AI 回复</div><div class="md-out">${renderMd(fullText)}</div></div>`;
  } catch (e) {
    showStatus($('followupStatus'), '❌ ' + e.message, 'error');
    $('mdOutput').innerHTML = prevContent;
  }

  $('sendFollowupBtn').disabled = false;
  $('sendFollowupBtn').textContent = '✨ 发送修改意见';
}

// ============================================================
// COPY & CLEAR
// ============================================================
function handleCopy() {
  const text = $('mdOutput').innerText || $('mdOutput').textContent || '';
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const o = $('copyBtn').innerHTML;
    $('copyBtn').innerHTML = '✅ 已复制';
    setTimeout(() => { $('copyBtn').innerHTML = o; }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    const o = $('copyBtn').innerHTML;
    $('copyBtn').innerHTML = '✅ 已复制';
    setTimeout(() => { $('copyBtn').innerHTML = o; }, 2000);
  });
}

function handleClear() {
  conversationHistory = []; currentRawText = '';
  $('mdOutput').innerHTML = ''; $('mdOutput').classList.add('hidden');
  $('outputPlaceholder').classList.remove('hidden');
  $('copyBtn').disabled = true; $('clearBtn').disabled = true; $('exportBtn').disabled = true;
  $('followupCard').classList.add('hidden');
  $('kwInput').value = '';
  document.querySelectorAll('input[name="scenario"]').forEach(r => r.checked = false);
  document.querySelectorAll('.scenario-opt').forEach(el => el.classList.remove('selected'));
  logClear();
}

// ============================================================
// EXPORT
// ============================================================
function exportWord() {
  if (!currentRawText) return;
  const blob = new Blob(['\ufeff' + currentRawText], { type: 'application/msword;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = '思政选题方案.doc';
  a.click(); URL.revokeObjectURL(url);
}

async function exportPpt() {
  if (!currentRawText || !window.PptxGenJS) { alert('PPT 库加载中，请稍后再试'); return; }
  const pptx = new PptxGenJS();
  pptx.defineLayout({ name: 'LAYOUT_WIDE', width: 13.33, height: 7.5 });
  pptx.layout = 'LAYOUT_WIDE';

  const titleSlide = pptx.addSlide();
  titleSlide.background = { color: '2c5f8a' };
  const kwText = $('kwInput').value.trim() || '思政主题';
  titleSlide.addText(kwText + '\n思政选题方案', { x: 1, y: 2, w: 11, h: 3, fontSize: 36, bold: true, color: 'FFFFFF', align: 'center' });
  titleSlide.addText('智能体版 · 为高校辅导员设计', { x: 1, y: 6.2, w: 11, h: 0.5, fontSize: 14, color: 'A8C8E8', align: 'center' });

  const lines = currentRawText.split('\n');
  let curSlide = null;
  let contentBuf = [];

  function flushSlide() {
    if (!curSlide) return;
    if (contentBuf.length > 0) {
      const txt = contentBuf.join('\n').slice(0, 800);
      curSlide.addText(txt, { x: 0.5, y: 1.4, w: 12.3, h: 5.6, fontSize: 13, color: '333333', valign: 'top', wrap: true });
    }
    curSlide = null; contentBuf = [];
  }

  for (const line of lines) {
    const h2 = line.match(/^## (.+)/);
    if (h2) {
      flushSlide();
      curSlide = pptx.addSlide();
      curSlide.background = { color: 'F8FAFC' };
      curSlide.addText(h2[1], { x: 0.5, y: 0.3, w: 12.3, h: 0.9, fontSize: 20, bold: true, color: '2c5f8a' });
      curSlide.addShape(pptx.ShapeType.rect, { x: 0.5, y: 1.1, w: 12.3, h: 0.05, fill: { color: 'E2E8F0' } });
    } else if (curSlide) {
      const clean = line.replace(/\*\*/g, '').replace(/^[-*] /, '• ').replace(/^#+\s*/, '');
      if (clean.trim()) contentBuf.push(clean);
    }
  }
  flushSlide();
  await pptx.writeFile({ fileName: '思政选题方案.pptx' });
}

// ============================================================
// KEYWORD GROUPS
// ============================================================
function renderKwGroups() {
  $('kwGroups').innerHTML = KEYWORD_GROUPS.map(g => `
    <div class="kw-group">
      <div class="kw-group-name">${g.name}</div>
      <div class="kw-tags">${g.tags.map(t => `<span class="kw-tag" data-w="${esc(t)}">${esc(t)}</span>`).join('')}</div>
    </div>
  `).join('');
  $('kwGroups').addEventListener('click', e => {
    if (e.target.classList.contains('kw-tag')) {
      const w = e.target.dataset.w;
      const cur = $('kwInput').value.trim();
      $('kwInput').value = cur ? cur + '、' + w : w;
    }
  });
}

// ============================================================
// INIT
// ============================================================
function init() {
  // Load saved keys
  const savedApi = localStorage.getItem(LS_API);
  const savedSerper = localStorage.getItem(LS_SERPER);
  if (savedApi) { $('apiKeyInput').value = savedApi; $('apiPanel').classList.add('collapsed'); $('apiToggleBtn').textContent = '展开 ▼'; }
  if (savedSerper) $('serperKeyInput').value = savedSerper;

  renderKwGroups();

  // API key save
  $('saveApiKeyBtn').addEventListener('click', () => {
    const k = $('apiKeyInput').value.trim();
    if (!k) { showStatus($('inputStatus'), '请输入 API Key', 'error'); return; }
    localStorage.setItem(LS_API, k);
    showStatus($('inputStatus'), '✅ DeepSeek Key 已保存', 'success');
    setTimeout(() => hideStatus($('inputStatus')), 2500);
  });

  $('saveSerperKeyBtn').addEventListener('click', () => {
    const k = $('serperKeyInput').value.trim();
    if (k) localStorage.setItem(LS_SERPER, k);
    showStatus($('inputStatus'), k ? '✅ Serper Key 已保存' : '已清除 Serper Key', k ? 'success' : 'error');
    setTimeout(() => hideStatus($('inputStatus')), 2500);
  });

  // API panel toggle
  $('apiToggleBtn').addEventListener('click', () => {
    const c = $('apiPanel').classList.toggle('collapsed');
    $('apiToggleBtn').textContent = c ? '展开 ▼' : '收起 ▲';
  });

  // Collapsible requirement panel
  $('reqToggle').addEventListener('click', () => {
    $('reqPanel').classList.toggle('open');
  });

  // Scenario select visual
  $('scenarioGroup').addEventListener('change', () => {
    document.querySelectorAll('.scenario-opt').forEach(el => {
      el.classList.toggle('selected', el.querySelector('input').checked);
    });
  });

  // Generate
  $('generateBtn').addEventListener('click', handleGenerate);

  // Copy / Clear
  $('copyBtn').addEventListener('click', handleCopy);
  $('clearBtn').addEventListener('click', handleClear);

  // Follow-up
  $('sendFollowupBtn').addEventListener('click', handleFollowup);
  $('followupInput').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') handleFollowup();
  });

  // Export dropdown
  $('exportBtn').addEventListener('click', e => {
    e.stopPropagation();
    $('exportMenu').classList.toggle('open');
  });
  document.addEventListener('click', () => $('exportMenu').classList.remove('open'));
  $('exportWordBtn').addEventListener('click', () => { $('exportMenu').classList.remove('open'); exportWord(); });
  $('exportPptBtn').addEventListener('click', () => { $('exportMenu').classList.remove('open'); exportPpt(); });

  // Log clear
  $('logClearBtn').addEventListener('click', logClear);
}

init();
</script>
